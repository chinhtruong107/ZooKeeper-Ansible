---
- name: Create zookeeper group
  group:
    name: zookeeper
    system: yes

- name: Create zookeeper user
  user:
    name: zookeeper
    group: zookeeper
    home: /opt/zookeeper
    shell: /usr/sbin/nologin
    system: yes
    create_home: no

- name: Create directories
  file:
    path: "{{ item.path }}"
    state: directory
    owner: zookeeper
    group: zookeeper
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ zookeeper_install_dir }}", mode: "0755" }
    - { path: "{{ zookeeper_config_dir }}", mode: "0750" }
    - { path: "{{ zookeeper_data_dir }}", mode: "0750" }
    - { path: "{{ zookeeper_datalog_dir }}", mode: "0750" }
    - { path: "{{ zookeeper_log_dir }}", mode: "0750" }

- name: Check directories
  command: "ls -ld {{ item }}"
  register: result
  loop:
    - "{{ zookeeper_data_dir }}"
    - "{{ zookeeper_datalog_dir }}"

- name: Show check results
  debug:
    msg: "{{ item.stdout }}"
  loop: "{{ result.results }}"

- name: Download ZooKeeper
  get_url:
    url: "https://downloads.apache.org/zookeeper/zookeeper-{{ zookeeper_version }}/apache-zookeeper-{{ zookeeper_version }}-bin.tar.gz"
    dest: "/tmp/apache-zookeeper-{{ zookeeper_version }}-bin.tar.gz"

- name: Extract ZooKeeper
  unarchive:
    src: "/tmp/apache-zookeeper-{{ zookeeper_version }}-bin.tar.gz"
    dest: /opt/
    remote_src: yes
    owner: zookeeper
    group: zookeeper
    creates: "/opt/apache-zookeeper-{{ zookeeper_version }}-bin"

- name: Create current symlink
  file:
    src: "/opt/apache-zookeeper-{{ zookeeper_version }}-bin"
    dest: "/opt/zookeeper/current"
    state: link
    owner: zookeeper
    group: zookeeper

- name: Create zoo.cfg
  template:
    src: zoo.cfg.j2
    dest: "{{ zookeeper_config_dir }}/zoo.cfg"
    owner: zookeeper
    group: zookeeper
    mode: "0640"
  notify: Restart zookeeper

- name: Create myid file
  copy:
    content: "{{ zookeeper_nodes | selectattr('host', 'equalto', inventory_hostname) | map(attribute='id') | first }}"
    dest: "{{ zookeeper_data_dir }}/myid"
    owner: zookeeper
    group: zookeeper
    mode: "0644"

- name: Create zookeeper environment file
  template:
    src: zookeeper-env.sh.j2
    dest: "{{ zookeeper_config_dir }}/zookeeper-env.sh"
    owner: zookeeper
    group: zookeeper
    mode: "0640"
  notify: Restart zookeeper

- name: Check zookeeper environment file
  command: cat {{ zookeeper_config_dir }}/zookeeper-env.sh
  register: env_result

- name: Show environment file
  debug:
    msg: "{{ env_result.stdout }}"

- name: Create systemd service file
  template:
    src: zookeeper.service.j2
    dest: "/etc/systemd/system/zookeeper.service"

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Start zookeeper service
  systemd:
    name: zookeeper
    state: started
    enabled: yes

- name: Check systemd service
  command: systemctl cat zookeeper
  register: systemd_result

- name: Show systemd result
  debug:
    msg: "{{ systemd_result.stdout }}"