---
- name: Tao group zookeeper
  group:
    name: zookeeper
    system: yes

- name: Tao user zookeeper
  user:
    name: zookeeper
    group: zookeeper
    home: /opt/zookeeper
    shell: /usr/sbin/nologin
    system: yes
    create_home: no

- name: Tao cac thu muc
  file:
    path: "{{ item.path }}"
    state: directory
    owner: zookeeper
    group: zookeeper
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ zookeeper_install_dir }}", mode: "0755" }
    - { path: "{{ zookeeper_config_dir }}", mode: "0750" }
    - { path: "{{ zookeeper_data_dir }}", mode: "0750" }
    - { path: "{{ zookeeper_data_dir }}", mode: "0750" }
    - { path: "{{ zookeeper_datalog_dir }}", mode: "0750" }
    - { path: "{{ zookeeper_log_dir }}", mode: "0750" }

- name: Kiem tra thu muc
  command: "ls -ld {{ item }}"
  register: result
  loop:
    - "{{ zookeeper_data_dir }}"
    - "{{ zookeeper_datalog_dir }}"

- name: Hien thi ket qua
  debug:
    msg: "{{ item.stdout }}"
  loop: "{{ result.results }}"

- name: Tai ZooKeeper
  get_url:
    url: "https://downloads.apache.org/zookeeper/zookeeper-{{ zookeeper_version }}/apache-zookeeper-{{ zookeeper_version }}-bin.tar.gz"
    dest: "/tmp/apache-zookeeper-{{ zookeeper_version }}-bin.tar.gz"

- name: Giai nen ZooKeeper
  unarchive:
    src: "/tmp/apache-zookeeper-{{ zookeeper_version }}-bin.tar.gz"
    dest: /opt/
    remote_src: yes
    owner: zookeeper
    group: zookeeper

- name: Tao symlink current
  file:
    src: "/opt/apache-zookeeper-{{ zookeeper_version }}-bin"
    dest: "/opt/zookeeper/current"
    state: link
    owner: zookeeper
    group: zookeeper

- name: Tao file zoo.cfg
  template:
    src: zoo.cfg.j2
    dest: "{{ zookeeper_config_dir }}/zoo.cfg"
    owner: zookeeper
    group: zookeeper
    mode: "0640"
  notify: Restart zookeeper

- name: Tao file myid
  copy:
    content: "{{ zookeeper_nodes | selectattr('host', 'equalto', inventory_hostname) | map(attribute='id') | first }}"
    dest: "{{ zookeeper_data_dir }}/myid"
    owner: zookeeper
    group: zookeeper
    mode: "0644"

- name: Tao file zookeeper-env.sh
  template:
    src: zookeeper-env.sh.j2
    dest: "{{ zookeeper_config_dir }}/zookeeper-env.sh"
    owner: zookeeper
    group: zookeeper
    mode: "0640"
  notify: Restart zookeeper

- name: Kiem tra file zookeeper-env.sh
  command: cat {{ zookeeper_config_dir }}/zookeeper-env.sh
  register: env_result

- name: Hien thi ket qua
  debug:
    msg: "{{ env_result.stdout }}"

- name: Tao file service systemd
  template:
    src: zookeeper.service.j2
    dest: "/etc/systemd/system/zookeeper.service"

- name: Reload systemd
  systemd: 
    daemon_reload: yes

- name: Khoi dong zookeeper
  systemd: 
    name: zookeeper
    state: started
    enabled: yes

- name: Kiem tra systemd
  shell: systemctl cat zookeeper
  register: systemd_result

- name: Hien thi ket qua
  debug:
    msg: "{{ systemd_result.stdout }}"



