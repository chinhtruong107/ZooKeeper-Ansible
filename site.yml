---
- name: Provision all nodes
  hosts: zookeeper
  become: true
  vars_files:
    - group_vars/zookeeper.yml
    - group_vars/vault.yml
  roles:
    - common

- name: Install ZooKeeper
  hosts: zookeeper
  become: true
  vars_files:
    - group_vars/zookeeper.yml
    - group_vars/vault.yml
  roles:
    - zookeeper

- name: Start ZooKeeper cluster
  hosts: zookeeper
  become: true
  serial: 1
  vars_files:
    - group_vars/zookeeper.yml
    - group_vars/vault.yml
  tasks:
    - name: Start ZooKeeper service
      systemd:
        name: zookeeper
        state: started
        enabled: yes

    - name: Check ZooKeeper status
      shell: systemctl status zookeeper
      register: status_result
      changed_when: false

    - name: Show status
      debug:
        msg: "{{ status_result.stdout }}"

- name: Verify cluster
  hosts: zookeeper
  become: true
  vars_files:
    - group_vars/zookeeper.yml
    - group_vars/vault.yml
  roles:
    - verify  
